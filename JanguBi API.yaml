          maxLength: 200
          pattern: ^[-a-zA-Z0-9_]+$
        order:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        testament:
          type: string
          readOnly: true
        verse_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
