openapi: 3.0.3
info:
  title: JanguBi API
  version: 1.0.0
  description: API for JanguBi
paths:
  /api/v1/availability/available/:
    get:
      operationId: v1_availability_available_list
      summary: Get available ministers for a specific date and service
      parameters:
      - in: query
        name: date
        schema:
          type: string
          format: date
        required: true
      - in: query
        name: service
        schema:
          type: string
          maxLength: 255
          minLength: 1
        required: true
      tags:
      - Availability
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MinisterList'
          description: ''
  /api/v1/availability/calendar/{slug}/:
    get:
      operationId: v1_availability_calendar_retrieve
      summary: Get a minister's availability calendar for a specific month
      parameters:
      - in: query
        name: month
        schema:
          type: string
          maxLength: 7
          minLength: 1
        required: true
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Availability
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthCalendar'
          description: ''
  /api/v1/availability/ministers/:
    get:
      operationId: v1_availability_ministers_list
      summary: List all active ministers
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: parish__slug
        schema:
          type: string
      - in: query
        name: role
        schema:
          type: string
          enum:
          - BISHOP
          - DEACON
          - PRIEST
          - RELIGIOUS
          - SISTER
        description: |-
          * `PRIEST` - Priest
          * `SISTER` - Sister
          * `DEACON` - Deacon
          * `RELIGIOUS` - Religious
          * `BISHOP` - Bishop
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Availability
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMinisterListList'
          description: ''
    post:
      operationId: v1_availability_ministers_create
      summary: Create a new minister profile
      tags:
      - Availability
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MinisterList'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MinisterList'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MinisterList'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MinisterList'
          description: ''
  /api/v1/availability/ministers/{slug}/:
    get:
      operationId: v1_availability_ministers_retrieve
      summary: Get minister details
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Availability
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MinisterDetail'
          description: ''
    put:
      operationId: v1_availability_ministers_update
      summary: Update minister details
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Availability
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MinisterDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MinisterDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MinisterDetail'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MinisterDetail'
          description: ''
    patch:
      operationId: v1_availability_ministers_partial_update
      summary: Partially update minister details
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Availability
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMinisterDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMinisterDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMinisterDetail'
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MinisterDetail'
          description: ''
    delete:
      operationId: v1_availability_ministers_destroy
      summary: Delete minister profile
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Availability
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/availability/ministers/{slug}/available/:
    get:
      operationId: v1_availability_ministers_available_list
      summary: Get available slots for a minister on a specific date
      parameters:
      - in: query
        name: date
        schema:
          type: string
          format: date
        required: true
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
