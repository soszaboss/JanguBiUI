          description: ''
  /api/v1/liturgy/readings/{id}/:
    get:
      operationId: v1_liturgy_readings_retrieve
      description: "\n        Retrieve a specific Reading (e.g., the Gospel) by its
        ID.\n        This includes any matched local Bible verses (cross-references).\n
        \       "
      summary: Get details of a specific Mass Reading
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Liturgy
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reading'
          description: ''
  /api/v1/liturgy/today/:
    get:
      operationId: v1_liturgy_today_retrieve
      description: "\n        Retrieve the official liturgical texts for the CURRENT
        day (in the 'romain' zone).\n        This includes the 'Mass' readings (First
        Reading, Gospel, etc.) and the \n        Liturgy of the Hours text blocks
        (Lauds, Vespers, Compline, etc.).\n        "
      summary: Get today's Liturgical data (Mass Readings, Offices)
      tags:
      - Liturgy
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiturgicalDate'
          description: ''
  /api/v1/rag/query/:
    post:
      operationId: v1_rag_query_create
      summary: Ask a question to the AI assistant using RAG (Retrieval-Augmented Generation)
      tags:
      - RAG
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagQuery'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RagQuery'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RagQuery'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagResponse'
          description: ''
  /api/v1/rosary/day/{day}/:
    get:
      operationId: v1_rosary_day_retrieve
      description: "\n        Fetches the Rosary Group assigned to a given weekday,
        along with the introductory \n        and concluding standalone prayers.\n
        \       \n        **Day mapping (0-6):**\n        0: Monday (Joyeux)\n        1:
        Tuesday (Douloureux)\n        2: Wednesday (Glorieux)\n        3: Thursday
        (Lumineux)\n        4: Friday (Douloureux)\n        5: Saturday (Joyeux)\n
        \       6: Sunday (Glorieux)\n        "
      summary: Get rosary prayers for a specific day of the week
      parameters:
      - in: path
        name: day
        schema:
          type: integer
        required: true
      tags:
      - Rosary
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodayRosaryOutput'
          description: ''
  /api/v1/rosary/groups/:
    get:
      operationId: v1_rosary_groups_list
      description: "\n        Returns a list of all Rosary Groups (Joyeux, Lumineux,
        Douloureux, Glorieux).\n        \n        **What is a Rosary Group?**\n        In
        the Catholic tradition, the Rosary is a meditative prayer based on the life
        of Jesus Christ. \n        It is divided into 4 groups called 'Mysteries'.
        Each group contains 5 specific events \n        (e.g., 'The Annunciation'
        is the 1st Joyful Mystery).\n        "
      summary: List all rosary groups (Mysteries)
      tags:
      - Rosary
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
          description: ''
  /api/v1/rosary/groups/{slug}/:
    get:
      operationId: v1_rosary_groups_retrieve
      description: "\n        Retrieve a specific Rosary Group (e.g., 'joyeux') and
        its 5 mysteries.\n        \n        **Structure of a Mystery (Dizaine/Decade):**\n
        \       When praying a mystery, the believer meditates on the event (often
        reading a short scripture), \n        then recites a specific sequence of
        prayers:\n        1. One 'Our Father' (Notre Père)\n        2. Ten 'Hail Mary's
        (Je vous salue Marie) - This is why it's called a 'decade' or 'dizaine'.\n
        \       3. One 'Glory Be' (Gloire au Père)\n        4. (Optional) The Fatima
        Prayer\n        \n        The API returns this exact sequential order of prayers
        under each mystery.\n        "
      summary: Get details of a specific rosary group by slug
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Rosary
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
          description: ''
  /api/v1/rosary/mysteries/{id}/:
    get:
      operationId: v1_rosary_mysteries_retrieve
      description: "\n        Retrieve a specific Mystery by its ID, complete with
        its scriptural meditation \n        and the full sequence of prayers (1 Our
        Father, 10 Hail Marys, etc.) that \n        compose its 'decade'.\n        "
      summary: Get details of a specific Mystery (Dizaine)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Rosary
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mystery'
          description: ''
  /api/v1/rosary/prayers/:
    get:
      operationId: v1_rosary_prayers_list
      description: "\n        Retrieve all foundational pieces used in the Rosary,
        such as the 'Our Father', \n        the 'Apostles Creed' (Je crois en Dieu),
        or the 'Fatima Prayer'.\n        "
      summary: List all foundational standalone prayers
      tags:
      - Rosary
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Prayer'
          description: ''
  /api/v1/rosary/search/:
    get:
      operationId: v1_rosary_search_list
      summary: Search within rosary prayers using text match
      parameters:
      - in: query
        name: q
        schema:
          type: string
        description: Search query
      tags:
      - Rosary
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchPrayer'
          description: ''
  /api/v1/rosary/today/:
    get:
      operationId: v1_rosary_today_retrieve
      description: "\n        Fetches the Rosary Group assigned to the current day
        of the week, along with the introductory \n        and concluding prayers.\n
        \       \n        **Daily Tradition:**\n        - Monday & Saturday: Joyful
        Mysteries (Joyeux)\n        - Tuesday & Friday: Sorrowful Mysteries (Douloureux)\n
        \       - Wednesday & Sunday: Glorious Mysteries (Glorieux)\n        - Thursday:
        Luminous Mysteries (Lumineux)\n        \n        This endpoint also returns
        `standalone_prayers` (like the Apostles' Creed or the Hail Holy Queen) \n
        \       which are recited at the very beginning and very end of the entire
        Rosary.\n        "
      summary: Get today's rosary prayers along with standalone prayers
      tags:
      - Rosary
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodayRosaryOutput'
          description: ''
  /api/v1/rosary/vector_search/:
    get:
      operationId: v1_rosary_vector_search_list
      description: Stub endpoint for future RAG implementation via pgvector.
      summary: Search within rosary prayers using vector embeddings
      parameters:
