  /api/v1/bible/books/:
    get:
      operationId: v1_bible_books_list
      description: Returns paginated list of all books, optionally filtered by testament
        and searched by name.
      summary: List all books with optional testament filter and name search
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: Number of results to return per page.
      - in: query
        name: offset
        schema:
          type: integer
        description: The initial index from which to return the results.
      - in: query
        name: search
        schema:
          type: string
          nullable: true
      - in: query
        name: testament
        schema:
          type: string
          nullable: true
      tags:
      - Bible
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookMetadataOutput'
          description: ''
  /api/v1/bible/books/{book_id}/chapters/{chapter_number}/verses/:
    get:
      operationId: v1_bible_books_chapters_verses_list
      description: Returns list of verses for a specific chapter.
      summary: List verses for a specific chapter
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      - in: path
        name: chapter_number
        schema:
          type: integer
        required: true
      - in: query
        name: excerpt
        schema:
          type: boolean
          default: false
      - in: query
        name: limit
        schema:
          type: integer
        description: Number of results to return per page.
      - in: query
        name: offset
        schema:
          type: integer
        description: The initial index from which to return the results.
      - in: query
        name: verses
        schema:
          type: string
          nullable: true
      tags:
      - Bible
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VerseOutput'
          description: ''
  /api/v1/bible/search/:
    get:
      operationId: v1_bible_search_list
      description: Search endpoint using lexical/hybrid search.
      summary: Lexical and hybrid search across all verses
      parameters:
      - in: query
        name: book_slug
        schema:
          type: string
          nullable: true
      - in: query
        name: chapter_number
        schema:
          type: integer
          nullable: true
      - in: query
        name: hybrid
        schema:
          type: boolean
          default: false
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 500
          default: 50
      - in: query
        name: q
        schema:
          type: string
          minLength: 3
        required: true
      - in: query
        name: testament
        schema:
          type: string
          nullable: true
      tags:
      - Bible
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchBookGroupOutput'
          description: ''
