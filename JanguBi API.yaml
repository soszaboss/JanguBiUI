  /api/v1/liturgy/date/{date_str}/:
    get:
      operationId: v1_liturgy_date_retrieve
      description: "\n        Retrieve the liturgical texts for a specific date (YYYY-MM-DD).\n
        \       If the data is not available locally, this endpoint returns a 404.\n
        \       "
      summary: Get Liturgical data for a specific date
      parameters:
      - in: path
        name: date_str
        schema:
          type: string
        required: true
      tags:
      - Liturgy
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiturgicalDate'
          description: ''
  /api/v1/liturgy/offices/{id}/:
    get:
      operationId: v1_liturgy_offices_retrieve
      description: "\n        Retrieve a specific Office by its ID. \n        Returns
        the hymns, psalms, and intercessions associated with that office.\n        "
      summary: Get details of a specific Office (e.g., Lauds)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Liturgy
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
